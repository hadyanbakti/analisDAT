services:
  - type: web
    name: analisdat-api
    runtime: python
    repo: https://github.com/your-username/analisDAT
    plan: free
    region: singapore
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: analisdat-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        value: openai/gpt-oss-120b
      - key: LLM_PROVIDER
        value: openai
      - key: CORS_ORIGINS
        value: '["*"]'

databases:
  - name: analisdat-db
    plan: free
    region: singapore
    databaseName: analisdat
    ipAllowList: []
